<!DOCTYPE html>
<html>
    <head>
        <title>
            LEOTHERA | COMMISSIONS
        </title>

        <script src="script.js"></script>
        <link rel="icon" type="image/png" href="./images/icon.png">
        <link rel="stylesheet" href="style.css">
    </head>

    <body oncontextmenu="return false;">
        <div class="center" style="width: 720px;">
            <h1>
                Commissions Page - Coming Soon
            </h1>
            <div id="commissionWindow">
                <div class="commisionCategory" style="background-image: url('images/comm2d.png');"
                title="Creating hand drawn artwork for personal/non commercial use">
                    <p class="commStatus" id="commClosed">
                        CLOSED
                    </p>
                </div>

                <div class="commisionCategory" style="background-image: url('images/comm3d.png');"
                title="Creating 3D artwork/models for personal/non commercial use">
                    <p class="commStatus" id="commClosed">
                        CLOSED
                    </p>
                </div>
                
                <div class="commisionCategory" style="background-image: url('images/commassets.png');"
                title="Creating Assets that you can use for commercial/non commercial game projects.">
                    <p class="commStatus" id="commClosed">
                        CLOSED
                    </p>
                </div>
            </div>
        </div>

         <!-- Taskbar -->
         <div class="taskbar">

            <div id="taskbarButton">
                <a class="noneType" onclick="window.location = './'">
                        Home
                </a>
            </div>

            <div id="taskbarButton" onclick="window.location = 'gallery'">
                <a class="noneType">
                        Gallery
                </a>
            </div>

            <div id="taskbarButton" onclick="window.location = 'software'">
                <a class="noneType">
                        Software
                </a>
            </div>

            <div id="clock" onclick="toggleEspee()">
                <img id="axo" src="./images/axoicon.png" title="Still the same Axolotl">
                <p id="localTime" title="Current time in my area">
                    00:00
                </p>
            </div>
        </div>
    </body>

</html>
